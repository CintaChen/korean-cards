<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>韩语单词卡 — 轻松学韩语</title>
  <style>
    :root {
      --bg:      oklch(97% 0.004 30);
      --surface: #ffffff;
      --fg:      oklch(22% 0.015 260);
      --muted:   oklch(50% 0.012 260);
      --border:  oklch(92% 0.005 30);
      --accent:  oklch(62% 0.14 12);
      --accent-blue: oklch(62% 0.10 235);
      --success: oklch(60% 0.13 150);
      --warn:    oklch(68% 0.13 85);
      --danger:  oklch(55% 0.16 22);

      --font-display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body:    'SF Pro Text', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-elevated: 0 8px 30px rgba(0,0,0,0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: oklch(94% 0.006 240);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: grid;
      place-items: center;
    }
    .app-frame {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      max-height: 932px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-elevated);
      border-radius: 0;
    }
    @media (min-width: 768px) {
      .app-frame {
        border-radius: 28px;
        height: min(100dvh - 40px, 880px);
      }
    }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      flex-shrink: 0;
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .app-logo svg { width: 32px; height: 32px; flex-shrink: 0; }
    .app-logo h1 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 620;
      letter-spacing: -0.01em;
      color: var(--fg);
    }

    /* Content */
    .app-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .app-content::-webkit-scrollbar { width: 0; }

    /* Hero */
    .hero {
      background: linear-gradient(135deg, oklch(85% 0.06 15 / 0.30), oklch(85% 0.06 235 / 0.25));
      border-radius: var(--radius);
      padding: 28px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .hero-icon {
      width: 56px; height: 56px;
      background: var(--surface);
      border-radius: 18px;
      display: grid;
      place-items: center;
      box-shadow: var(--shadow-card);
    }
    .hero-icon svg { width: 32px; height: 32px; }
    .hero h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 620;
      letter-spacing: -0.01em;
    }
    .hero p {
      font-size: 14px;
      color: var(--muted);
      max-width: 280px;
      line-height: 1.6;
    }
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 550;
      color: var(--accent);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .streak-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* Nav cards */
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .nav-card {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 18px;
      text-decoration: none;
      color: var(--fg);
      box-shadow: var(--shadow-card);
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer;
      border: 1.5px solid transparent;
    }
    .nav-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-elevated); }
    .nav-card:active { transform: translateY(0); }
    .nav-card .card-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
    }
    .nav-card .card-icon svg { width: 22px; height: 22px; }
    .nav-card:nth-child(1) .card-icon { background: oklch(85% 0.06 12 / 0.25); color: var(--accent); }
    .nav-card:nth-child(2) .card-icon { background: oklch(85% 0.06 235 / 0.25); color: var(--accent-blue); }
    .nav-card:nth-child(3) .card-icon { background: oklch(85% 0.06 150 / 0.20); color: var(--success); }
    .nav-card:nth-child(4) .card-icon { background: oklch(85% 0.06 85 / 0.20); color: var(--warn); }
    .nav-card h3 {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .nav-card p {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* Footer */
    .app-footer {
      text-align: center;
      padding: 8px 20px 20px;
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="app-frame">
    <header class="app-header">
      <div class="app-logo">
        <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="10" fill="oklch(85% 0.06 12 / 0.30)"/><text x="16" y="22" text-anchor="middle" font-size="17" font-weight="700" fill="var(--accent)">한</text></svg>
        <h1>韩语单词卡</h1>
      </div>
    </header>

    <main class="app-content">
      <section class="hero">
        <div class="hero-icon">
          <svg viewBox="0 0 32 32" fill="none"><rect x="2" y="4" width="28" height="24" rx="4" stroke="var(--accent)" stroke-width="1.8" fill="none"/><line x1="2" y1="12" x2="30" y2="12" stroke="var(--accent)" stroke-width="1.2" opacity="0.4"/><line x1="10" y1="16" x2="22" y2="16" stroke="var(--accent)" stroke-width="1.4" stroke-linecap="round"/></svg>
        </div>
        <h2>每天一点，轻松学韩语</h2>
        <p>翻转记忆卡片，用间隔复习法高效积累韩语词汇</p>
        <span class="streak-badge"><span class="dot"></span>连续学习 7 天</span>
      </section>

      <nav class="nav-grid">
        <a class="nav-card" href="review.html">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="15" y2="14"/></svg>
          </div>
          <h3>今日复习</h3>
          <p>翻转卡片 · 间隔记忆</p>
        </a>
        <a class="nav-card" href="word-list.html">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
          </div>
          <h3>单词列表</h3>
          <p>搜索 · 分类筛选</p>
        </a>
        <a class="nav-card" href="add-word.html">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          </div>
          <h3>添加单词</h3>
          <p>录入新词 · 丰富词库</p>
        </a>
        <a class="nav-card" href="stats.html">
          <div class="card-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="10" y="7" width="4" height="13" rx="1"/><rect x="17" y="2" width="4" height="18" rx="1"/></svg>
          </div>
          <h3>学习统计</h3>
          <p>进度追踪 · 分类数据</p>
        </a>
      </nav>
    </main>

    <footer class="app-footer">每次 5 分钟，积少成多 ✦</footer>
  </div>
</body>
</html>
