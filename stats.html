<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学习统计 — 韩语单词卡</title>
  <style>
    :root {
      --bg:      oklch(97% 0.004 30);
      --surface: #ffffff;
      --fg:      oklch(22% 0.015 260);
      --muted:   oklch(50% 0.012 260);
      --border:  oklch(92% 0.005 30);
      --accent:  oklch(62% 0.14 12);
      --accent-blue: oklch(62% 0.10 235);
      --success: oklch(60% 0.13 150);
      --warn:    oklch(68% 0.13 85);
      --danger:  oklch(55% 0.16 22);
      --font-display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --font-body:    'SF Pro Text', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
      --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: oklch(94% 0.006 240);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    .app-frame {
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      max-height: 932px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.10);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    @media (min-width: 768px) {
      .app-frame { border-radius: 28px; height: min(100dvh - 40px, 880px); }
    }
    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px 10px;
      flex-shrink: 0;
    }
    .back-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      color: var(--fg);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      transition: background 0.15s;
      text-decoration: none;
    }
    .back-btn:hover { background: oklch(95% 0.003 30); }
    .header-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 620;
      letter-spacing: -0.01em;
    }

    /* Content */
    .app-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .app-content::-webkit-scrollbar { width: 0; }

    /* Stat cards row */
    .stat-cards {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 12px;
      text-align: center;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 620;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .stat-num.total { color: var(--accent-blue); }
    .stat-num.mastered { color: var(--success); }
    .stat-num.review { color: var(--warn); }
    .stat-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* Overall progress */
    .progress-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-card);
    }
    .progress-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.005em;
      margin-bottom: 12px;
    }
    .progress-bar-wrap {
      height: 10px;
      background: oklch(94% 0.004 30);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-blue));
      transition: width 0.6s ease;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    /* Category breakdown */
    .cat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow-card);
    }
    .cat-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.005em;
      margin-bottom: 14px;
    }
    .cat-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .cat-row:last-child { margin-bottom: 0; }
    .cat-name {
      font-size: 13px;
      font-weight: 510;
      min-width: 48px;
      color: var(--fg);
    }
    .cat-bar-wrap {
      flex: 1;
      height: 8px;
      background: oklch(94% 0.004 30);
      border-radius: 999px;
      overflow: hidden;
    }
    .cat-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .cat-count {
      font-size: 12px;
      color: var(--muted);
      min-width: 36px;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .cat-row:nth-child(1) .cat-bar-fill { background: var(--accent); }
    .cat-row:nth-child(2) .cat-bar-fill { background: var(--accent-blue); }
    .cat-row:nth-child(3) .cat-bar-fill { background: var(--success); }
    .cat-row:nth-child(4) .cat-bar-fill { background: var(--warn); }
    .cat-row:nth-child(5) .cat-bar-fill { background: oklch(58% 0.12 290); }

    /* Streak */
    .streak-card {
      background: linear-gradient(135deg, oklch(85% 0.06 15 / 0.22), oklch(85% 0.06 235 / 0.18));
      border-radius: var(--radius);
      padding: 20px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-card);
    }
    .streak-icon {
      width: 44px; height: 44px;
      background: var(--surface);
      border-radius: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }
    .streak-icon svg { width: 24px; height: 24px; color: var(--accent); }
    .streak-info { flex: 1; }
    .streak-label { font-size: 13px; color: var(--muted); }
    .streak-value {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 620;
      letter-spacing: -0.01em;
      color: var(--accent);
    }

    /* Bottom nav */
    .bottom-nav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 6px 8px max(6px, env(safe-area-inset-bottom, 6px));
      flex-shrink: 0;
      z-index: 10;
    }
    @media (max-width: 767px) {
      .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; }
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--muted);
      font-size: 11px;
      font-weight: 510;
      letter-spacing: 0.02em;
      transition: color 0.15s;
      cursor: pointer;
    }
    .nav-item svg { width: 22px; height: 22px; }
    .nav-item.active { color: var(--accent); font-weight: 600; }
    .nav-item:not(.active):hover { color: var(--fg); }
  </style>
</head>
<body>
  <div class="app-frame">
    <header class="app-header">
      <a href="index.html" class="back-btn" aria-label="返回">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <span class="header-title">学习统计</span>
    </header>

    <main class="app-content">
      <div class="stat-cards">
        <div class="stat-card">
          <span class="stat-num total">30</span>
          <span class="stat-label">总单词数</span>
        </div>
        <div class="stat-card">
          <span class="stat-num mastered">10</span>
          <span class="stat-label">已掌握</span>
        </div>
        <div class="stat-card">
          <span class="stat-num review">20</span>
          <span class="stat-label">需复习</span>
        </div>
      </div>

      <section class="progress-card">
        <div class="progress-title">整体掌握进度</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:33%"></div>
        </div>
        <div class="progress-meta">
          <span>已掌握 33%</span>
          <span>目标 80%</span>
        </div>
      </section>

      <section class="cat-card">
        <div class="cat-title">分类学习情况</div>
        <div class="cat-row">
          <span class="cat-name">日常</span>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:50%"></div></div>
          <span class="cat-count">3/6</span>
        </div>
        <div class="cat-row">
          <span class="cat-name">TOPIK</span>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:0%"></div></div>
          <span class="cat-count">0/3</span>
        </div>
        <div class="cat-row">
          <span class="cat-name">名词</span>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:50%"></div></div>
          <span class="cat-count">4/8</span>
        </div>
        <div class="cat-row">
          <span class="cat-name">动词</span>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:38%"></div></div>
          <span class="cat-count">3/8</span>
        </div>
        <div class="cat-row">
          <span class="cat-name">形容词</span>
          <div class="cat-bar-wrap"><div class="cat-bar-fill" style="width:0%"></div></div>
          <span class="cat-count">0/5</span>
        </div>
      </section>

      <section class="streak-card">
        <div class="streak-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <div class="streak-info">
          <div class="streak-label">连续学习天数</div>
          <div class="streak-value">7 天</div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a class="nav-item" href="review.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        复习
      </a>
      <a class="nav-item" href="word-list.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
        单词
      </a>
      <a class="nav-item" href="add-word.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        添加
      </a>
      <span class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="10" y="7" width="4" height="13" rx="1"/><rect x="17" y="2" width="4" height="18" rx="1"/></svg>
        统计
      </span>
    </nav>
  </div>
</body>
</html>
